image: node:24

stages:
  - test

cache:
  paths:
    - node_modules/
    - ~/.cache/ms-playwright/

playwright_tests:
  stage: test

  before_script:
    - apt-get update
    - apt-get install -y default-jre
    - yarn
    - npx playwright install --with-deps

  script:
    - yarn e2e
    - npm install -g allure-commandline
    - allure generate allure-results --clean -o allure-report

  artifacts:
    when: always

    paths:
      - playwright-report/
      - test-results/
      - allure-results/
      - allure-report/
      - results.xml

    reports:
      junit: results.xml

    expire_in: 3 week