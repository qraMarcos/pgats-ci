image: node:24

stages:
  - test
  - deploy

cache:
  paths:
    - node_modules/

test:
  stage: test

  before_script:
    - apt-get update
    - apt-get install -y default-jre
    - yarn install

  script:
    - yarn playwright install --with-deps
    - yarn e2e
    - npm install -g allure-commandline
    - allure generate allure-results --clean -o allure-report

  artifacts:
    when: always

    paths:
      - playwright-report/
      - allure-report/
      - results.xml

    reports:
      junit: results.xml

pages:
  stage: deploy

  script:
    - mkdir public
    - cp -r allure-report/* public/

  artifacts:
    paths:
      - public

  only:
    - master